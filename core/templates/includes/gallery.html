{% load static %}
<section id="gallery" class="py-24 md:py-32 bg-[#F2E7D5]/40 relative overflow-hidden">
    <div class="blob-bg w-[400px] h-[400px] bg-[#7C9070] top-20 -right-32"></div>
    <div class="blob-bg w-[350px] h-[350px] bg-[#D97757] -bottom-20 -left-20 animate-float"></div>

    <div class="max-w-[1440px] mx-auto px-6 md:px-10 relative z-10">
        <!-- Section Header -->
        <div class="text-center max-w-3xl mx-auto mb-16">
            <div class="inline-flex items-center gap-2 bg-[#FDFBF7] px-4 py-2 rounded-full text-[#7C9070] font-bold text-sm uppercase tracking-widest mb-6 shadow-sm">
                <iconify-icon icon="ph:camera-bold"></iconify-icon>
                Moments of Impact
            </div>
            <h2 class="font-display text-3xl md:text-6xl font-bold text-[#2D2D2D] mb-6">Capturing <span class="text-[#D97757]">Growth</span></h2>
            <p class="text-lg text-[#5E5E5E] leading-relaxed">Experience the real stories of resilience and transformation from our communities worldwide, one frame at a time.</p>
        </div>

        <!-- Masonry Photo Grid (Homepage Version) -->
        <div id="home-gallery-grid" class="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8 min-h-[400px] transition-all duration-500">
            <!-- Items injected via JavaScript -->
        </div>

        <!-- View Full Journey CTA -->
        <div class="mt-20 text-center">
            <a href="{% url 'gallery' %}" class="inline-flex items-center gap-3 px-12 py-5 bg-[#7C9070] text-white rounded-2xl font-bold hover:bg-[#D97757] transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                <iconify-icon icon="ph:images-square-bold" class="text-xl"></iconify-icon>
                View Full Visual Journey
                <iconify-icon icon="ph:arrow-right-bold"></iconify-icon>
            </a>
        </div>
    </div>
</section>

<!-- Lightbox Modal (Shared Logic) -->
<div id="home-lightbox" class="fixed inset-0 z-[100] hidden bg-[#2D2D2D]/95 backdrop-blur-md opacity-0 transition-opacity duration-300">
    <button onclick="closeHomeLightbox()" class="absolute top-8 right-8 z-[110] p-4 text-white hover:text-[#D97757] transition-colors bg-white/10 rounded-full hover:bg-white/20">
        <iconify-icon icon="ph:x-bold" class="text-3xl"></iconify-icon>
    </button>
    <!-- Main Lightbox Container -->
    <div class="w-full h-full flex items-center justify-center p-6 md:p-12 relative">
        <!-- Image Area -->
        <div class="relative w-full h-full flex items-center justify-center overflow-hidden">
            <img id="home-lightbox-img" src="" alt="" class="w-auto h-auto min-w-0 min-h-0 max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl transform transition-transform duration-500">
        </div>

        <!-- Floating Navigation -->
        <div class="absolute inset-y-0 left-0 flex items-center px-4 md:px-10">
            <button onclick="navigateHomeLightbox(-1)" class="p-4 md:p-6 bg-black/20 hover:bg-black/40 text-white rounded-full backdrop-blur-md transition-all group">
                <iconify-icon icon="ph:caret-left-bold" class="text-3xl md:text-4xl group-hover:-translate-x-1 transition-transform"></iconify-icon>
            </button>
        </div>
        <div class="absolute inset-y-0 right-0 flex items-center px-4 md:px-10">
            <button onclick="navigateHomeLightbox(1)" class="p-4 md:p-6 bg-black/20 hover:bg-black/40 text-white rounded-full backdrop-blur-md transition-all group">
                <iconify-icon icon="ph:caret-right-bold" class="text-3xl md:text-4xl group-hover:translate-x-1 transition-transform"></iconify-icon>
            </button>
        </div>

        <!-- Lightbox Counter (Floating) -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-black/40 px-6 py-2 rounded-full text-white font-bold text-sm backdrop-blur-md">
            <span id="home-lightbox-counter">1 / 1</span>
        </div>
    </div>
</div>

<script>
    const homeGalleryData = JSON.parse('{{ gallery_photos_json|escapejs }}');
    let homeLightboxIndex = 0;

    function renderHomeGallery() {
        const grid = document.getElementById('home-gallery-grid');
        grid.innerHTML = '';
        
        // Show only first 5 for homepage to keep it lean
        const slice = homeGalleryData.slice(0, 5);

        slice.forEach((photo, idx) => {
            const card = document.createElement('div');
            card.className = 'home-gallery-item break-inside-avoid group relative rounded-[2.5rem] overflow-hidden border border-[#F2E7D5] bg-white hover:shadow-2xl transition-all duration-700 cursor-pointer opacity-0 translate-y-8';
            card.onclick = () => openHomeLightbox(idx);
            
            card.innerHTML = `
                <div class="relative overflow-hidden">
                    <img src="${photo.image}" alt="${photo.title}" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-[2000ms]">
                </div>
                <div class="p-8">
                    <h3 class="font-display text-xl font-bold text-[#2D2D2D] mb-2 leading-tight">${photo.title}</h3>
                    <p class="text-[#5E5E5E] text-xs line-clamp-2">${photo.description}</p>
                </div>
            `;
            
            grid.appendChild(card);
            setTimeout(() => card.classList.remove('opacity-0', 'translate-y-8'), idx * 100);
        });
    }

    function openHomeLightbox(index) {
        homeLightboxIndex = index;
        updateHomeLightbox();
        const lb = document.getElementById('home-lightbox');
        lb.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        setTimeout(() => lb.classList.add('opacity-100'), 10);
    }

    function closeHomeLightbox() {
        const lb = document.getElementById('home-lightbox');
        lb.classList.remove('opacity-100');
        setTimeout(() => {
            lb.classList.add('hidden');
            document.body.style.overflow = '';
        }, 300);
    }

    function updateHomeLightbox() {
        const p = homeGalleryData[homeLightboxIndex];
        document.getElementById('home-lightbox-img').src = p.image;
        document.getElementById('home-lightbox-counter').textContent = `${homeLightboxIndex + 1} / ${homeGalleryData.length}`;
    }

    function navigateHomeLightbox(dir) {
        homeLightboxIndex = (homeLightboxIndex + dir + homeGalleryData.length) % homeGalleryData.length;
        updateHomeLightbox();
    }

    document.addEventListener('DOMContentLoaded', renderHomeGallery);
</script>
