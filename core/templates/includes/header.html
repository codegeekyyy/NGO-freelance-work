{% load static %}
<header class="bg-[#FDFBF7] border-b border-[#F2E7D5] sticky top-0 z-50">
    <nav class="max-w-[1440px] mx-auto px-10 h-24 flex items-center justify-between">
        <a href="/" id="brand-logo-link" class="flex items-center gap-3 group">
            <img src="{% static 'core/images/logo.jpg' %}" alt="Leela Foundation Logo" class="h-16 w-auto transition-transform group-hover:scale-105">
            <span class="sr-only">Leela Foundation</span>
        </a>

        <div class="hidden lg:flex items-center gap-12 font-medium text-[#7C9070]">
            <a href="#stories" id="nav-stories-link" class="hover:text-[#D97757] transition-colors">Stories</a>
            <a href="#impact" id="nav-impact-link" class="hover:text-[#D97757] transition-colors">Our Impact</a>
            <a href="#gallery" id="nav-gallery-link" class="hover:text-[#D97757] transition-colors">Gallery</a>
            <a href="#volunteer" id="nav-volunteer-link" class="hover:text-[#D97757] transition-colors">Join Us</a>
            <a href="#about" id="nav-about-link" class="hover:text-[#D97757] transition-colors">About</a>
        </div>

        <div class="flex items-center gap-6">
            <button class="hidden md:block text-[#2D2D2D] font-bold hover:underline">Sign In</button>
            <a href="{% url 'donate' %}" id="nav-donate-btn" class="bg-[#D97757] text-white px-6 md:px-8 py-3 md:py-3.5 rounded-full font-bold hover:shadow-lg transition-all hover:-translate-y-0.5 text-sm md:text-base">
                Give Growth
            </a>
            <!-- Mobile Menu Toggle -->
            <button onclick="toggleMobileMenu()" class="lg:hidden text-[#2D2D2D] text-3xl flex items-center" id="mobile-menu-btn">
                <iconify-icon icon="ph:list-bold" id="menu-icon"></iconify-icon>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-[#FDFBF7] z-50 translate-x-full transition-transform duration-300 lg:hidden">
        <div class="p-10 flex flex-col h-full">
            <div class="flex items-center justify-between mb-16">
                <a href="/" class="flex items-center gap-3">
                    <img src="{% static 'core/images/logo.jpg' %}" alt="Leela Foundation Logo" class="h-12 w-auto">
                </a>
                <button onclick="toggleMobileMenu()" class="text-[#2D2D2D] text-3xl">
                    <iconify-icon icon="ph:x-bold"></iconify-icon>
                </button>
            </div>
            
            <div class="flex flex-col gap-8 text-2xl font-bold text-[#2D2D2D]">
                <a href="#stories" onclick="toggleMobileMenu()" class="hover:text-[#D97757]">Stories</a>
                <a href="#impact" onclick="toggleMobileMenu()" class="hover:text-[#D97757]">Our Impact</a>
                <a href="#gallery" onclick="toggleMobileMenu()" class="hover:text-[#D97757]">Gallery</a>
                <a href="#volunteer" onclick="toggleMobileMenu()" class="hover:text-[#D97757]">Join Us</a>
                <a href="#about" onclick="toggleMobileMenu()" class="hover:text-[#D97757]">About</a>
            </div>

            <div class="mt-auto space-y-6">
                <button class="w-full text-[#2D2D2D] font-bold text-xl py-4 border-2 border-[#F2E7D5] rounded-2xl">Sign In</button>
                <a href="{% url 'donate' %}" onclick="toggleMobileMenu()" class="block w-full bg-[#D97757] text-white text-center py-5 rounded-2xl font-bold text-xl">
                    Give Growth
                </a>
            </div>
        </div>
    </div>
</header>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const isOpened = !menu.classList.contains('translate-x-full');
        
        if (isOpened) {
            menu.classList.add('translate-x-full');
            document.body.style.overflow = '';
        } else {
            menu.classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden';
        }
    }
</script>
