<section id="stories" class="py-32 bg-[#F2E7D5]/50">
    <div class="max-w-[1440px] mx-auto px-10">
        <div class="text-center mb-20">
            <iconify-icon icon="ph:chat-circle-dots-bold" class="text-[#D97757] text-6xl mb-6"></iconify-icon>
            <h2 class="font-display text-5xl font-bold text-[#2D2D2D]">Whispers of Impact</h2>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
            {% for testimonial in testimonials %}
            <div class="bg-white p-12 rounded-[3rem] shadow-sm relative {% if forloop.counter == 2 %}md:translate-y-8{% endif %}">
                <div class="absolute -top-6 left-12 w-16 h-16 organic-radius-1 bg-[#F2E7D5] overflow-hidden border-4 border-white shadow-md">
                    {% if testimonial.image %}
                        <img src="{{ testimonial.image.url }}" alt="{{ testimonial.name }}" class="w-full h-full object-cover">
                    {% else %}
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{ testimonial.name }}" alt="{{ testimonial.name }}" class="w-full h-full object-cover">
                    {% endif %}
                </div>
                <p class="text-[#5E5E5E] italic text-lg leading-relaxed mb-8">
                    "{{ testimonial.content }}"
                </p>
                <h4 class="font-bold text-[#D97757]">{{ testimonial.name }}</h4>
                <p class="text-sm text-[#7C9070] font-medium uppercase">{{ testimonial.role }}</p>
            </div>
            {% empty %}
            <div class="col-span-full text-center py-10">
                <p class="text-[#5E5E5E]">No testimonials yet. Be the first to share your story!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
